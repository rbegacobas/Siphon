# Production compose — standalone (use: docker compose -f docker-compose.prod.yml up -d)
# Integrates with existing heavencoint-nginx reverse proxy on the VPS.

services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DOWNLOAD_DIR=/tmp/ytdownloads
      - YTDLP_COOKIES_FILE=/run/secrets/yt_cookies
    volumes:
      - downloads:/tmp/ytdownloads
    secrets:
      - yt_cookies
    depends_on:
      redis:
        condition: service_healthy
    networks:
      internal:
      heavencoint_external:
        aliases:
          - siphon-backend
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=3
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DOWNLOAD_DIR=/tmp/ytdownloads
      - YTDLP_COOKIES_FILE=/run/secrets/yt_cookies
    volumes:
      - downloads:/tmp/ytdownloads
    secrets:
      - yt_cookies
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build: ./frontend
    volumes:
      - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      heavencoint_external:
        aliases:
          - siphon-frontend
    restart: unless-stopped

secrets:
  yt_cookies:
    file: ./secrets/yt_cookies.txt

volumes:
  redis_data:
  downloads:

networks:
  internal:
  heavencoint_external:
    external: true
